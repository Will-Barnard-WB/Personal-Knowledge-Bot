services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pkb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pkbpassword}
      POSTGRES_DB: ${POSTGRES_DB:-personal_knowledge_bot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pkb} -d ${POSTGRES_DB:-personal_knowledge_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pkb_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pkb_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - whisper_cache:/root/.cache
    profiles:
      - full   # run with: docker compose --profile full up

volumes:
  postgres_data:
  redis_data:
  whisper_cache:
